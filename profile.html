<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Profile - Guide To Japan</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="profilestyle.css">
</head>
<body>

<header class="navbar">
    <div class="logo-area">
        <span class="logo-text"><a href="index.html">Guide To Japan</a></span>
    </div>
    <div class="search-bar">
        <span class="search-icon"><i class="fas fa-search"></i></span>
        <input type="text" placeholder="Search destinations, guides...">
    </div>
    <div class="nav-utils">
        <button class="icon-btn" aria-label="Messages"><i class="far fa-envelope"></i></button>
        <button class="icon-btn" aria-label="Notifications"><i class="far fa-bell"></i></button>
        <div class="user-avatar-small" title="MidnightShogun"></div>
    </div>
</header>

<main class="profile-main">
    <section class="cover-section">
        <div class="cover-placeholder">
            <button class="edit-cover-btn"><i class="fas fa-pencil-alt"></i> Choose your cover pic</button>
        </div>
    </section>

    <section class="profile-info-card">
        <div class="info-content">
            <div class="user-identity">
                <div class="profile-avatar-large"></div>
                <div class="user-name-tag">MidnightShogun</div>
            </div>
            <div class="user-stats">
                <p><i class="fas fa-cake-candles"></i> 1/1/2000</p>
                <p><i class="fas fa-location-dot"></i> La Trinidad, Philippines</p>
                <p><i class="fas fa-heart"></i> 24 · single</p>
            </div>
            <div class="edit-action">
                <button class="edit-icon-btn" aria-label="Edit profile"><i class="fas fa-pencil-alt"></i></button>
            </div>
        </div>
    </section>

    <section class="travel-history">
        <h3 class="section-title">Places That You Traveled</h3>
        <div class="travel-gallery">
            <div class="add-trip-card">
                <div class="plus-icon"><i class="fas fa-plus"></i></div>
                <p>Add new trip</p>
            </div>
            <div class="travel-card">
                <img src="Fuji.avif" alt="Mount Fuji">
                <div class="travel-label">Mount Fuji · 2023</div>
            </div>
            <div class="travel-card">
                <img src="Arashiyama.jpg" alt="Kyoto">
                <div class="travel-label">Kyoto Arashiyama · 2024</div>
            </div>
            <div class="travel-card">
                <img src="Nara.jpg" alt="Nara">
                <div class="travel-label">Nara Park · 2024</div>
            </div>
        </div>
    </section>
</main>

</body>
</html>
