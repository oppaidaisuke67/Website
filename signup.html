<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Guide to Japan | Sign Up</title>
    <link rel="stylesheet" href="Signupstyle.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700&family=Playfair+Display:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <div class="signup-wrapper">
        <div class="signup-card">
            <div class="signup-header-banner">
                <h1>Sign Up To Guide To Japan</h1>
            </div>

            <div class="signup-form-container">
                <div class="name-row">
                    <div class="input-group half">
                        <input type="text" id="firstName" class="form-input" placeholder="First Name" aria-label="First Name">
                    </div>
                    <div class="input-group half">
                        <input type="text" id="lastName" class="form-input" placeholder="Last Name" aria-label="Last Name">
                    </div>
                </div>

                <div class="input-group full">
                    <input type="text" id="username" class="form-input" placeholder="Username" aria-label="Username">
                </div>

                <div class="input-group full">
                    <input type="email" id="email" class="form-input" placeholder="Email" aria-label="Email">
                </div>

                <div class="input-group full">
                    <input type="password" id="password" class="form-input" placeholder="Password" aria-label="Password">
                </div>

                <div class="input-group full">
                    <input type="password" id="confirmPassword" class="form-input" placeholder="Confirm Password" aria-label="Confirm Password">
                </div>

                <button class="register-btn"><a href="index.html">Register</a></button>

                <div class="login-redirect">
                    <a href="Login.html" class="toggle-link">Already have an account?</a>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
