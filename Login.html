<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Guide to Japan | Authentic Login Experience</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&family=Playfair+Display:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="loginstyle.css">
</head>
<body>

<div class="japan-login-container">
    <div class="auth-sidebar">
        <div class="auth-card">
            <div class="login-header-badge">✦ Welcome  ✦</div>
            <div class="auth-gold-title">Login</div>

            <div class="input-group">
                <input type="text" class="input-field" placeholder="Email / Phone Number" aria-label="Email or phone number">
            </div>
            <div class="input-group">
                <input type="password" class="input-field" placeholder="Password" aria-label="Password">
            </div>

            <button class="login-btn"><a href="index.html">LOGIN</a></button>

            <div class="forgot-password">
                <a href="#">Forgot Password?</a>
            </div>

            <div class="signup-row">
                <span>New here? </span><a href="signup.html">Sign Up</a>
            </div>

            <div class="social-section">
                <span class="social-label">Login Using These</span>
                <div class="social-icons">
                    <a href="#" class="social-icon" aria-label="Facebook"><i class="fab fa-facebook-f"></i></a>
                    <a href="#" class="social-icon" aria-label="Google"><i class="fab fa-google"></i></a>
                    <a href="#" class="social-icon" aria-label="X (Twitter)"><i class="fab fa-twitter"></i></a>
                    <a href="#" class="social-icon" aria-label="TikTok"><i class="fab fa-tiktok"></i></a>
                </div>
            </div>
        </div>
    </div>

    <div class="branding-area">
        <div class="welcome-banner">
            <h1>WELCOME TO GUIDE TO JAPAN</h1>
        </div>

        <div class="empty-visual-container">
            <div class="placeholder-content">
                <i class="fas fa-torii-gate"></i>
                <h3>旅 · Tabi</h3>
                <p>Discover ancient temples, vibrant cities & cherry blossom serenity. Your journey begins with a single step.</p>
                <div class="decorative-sakura">
                    ✧ 桜 ✧
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
